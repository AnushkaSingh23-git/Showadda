<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings – BookMyShow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Mulish', sans-serif; }
    body { background: rgb(245,245,250); min-height: 100vh; }
    .fnav { display:flex; justify-content:space-between; align-items:center; padding:12px 30px; background:rgb(42,42,68); color:white; }
    .fnav .logo { font-size:22px; font-weight:700; color:rgb(244,69,98); }
    .fnav-right { display:flex; gap:10px; align-items:center; }
    .fnav button { padding:7px 16px; border:none; border-radius:4px; cursor:pointer; font-weight:600; font-size:13px; }
.btn-logout { background:rgb(244,69,98); color:white; }
    .btn-logout:hover { background:rgb(210,45,75); }
    .page { max-width:900px; margin:40px auto; padding:0 20px; }
    h1 { font-size:24px; color:rgb(26,26,48); margin-bottom:6px; }
    .subtitle { color:#888; font-size:14px; margin-bottom:28px; }
    .empty { text-align:center; padding:60px 20px; color:#888; }
    .empty i { font-size:48px; color:#ddd; margin-bottom:16px; display:block; }
    .empty a { color:rgb(244,69,98); text-decoration:none; font-weight:600; }
    .booking-card { background:white; border-radius:10px; box-shadow:0 2px 12px rgba(0,0,0,0.08); margin-bottom:18px; display:flex; gap:0; overflow:hidden; }
    .booking-img { width:100px; min-height:120px; object-fit:cover; flex-shrink:0; }
    .booking-img-placeholder { width:100px; background:rgb(42,42,68); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .booking-img-placeholder i { color:rgba(255,255,255,0.3); font-size:28px; }
    .booking-info { padding:16px 20px; flex:1; }
    .booking-title { font-size:17px; font-weight:700; color:rgb(26,26,48); margin-bottom:8px; }
    .booking-meta { display:flex; flex-wrap:wrap; gap:18px; font-size:13px; color:#555; }
    .booking-meta span { display:flex; align-items:center; gap:5px; }
    .booking-meta i { color:rgb(244,69,98); }
    .booking-seats { margin-top:10px; }
    .seat-tag { display:inline-block; background:rgb(244,69,98); color:white; font-size:11px; font-weight:600; padding:2px 8px; border-radius:12px; margin:2px; }
    .booking-badge { display:inline-block; background:#e0ffe5; color:#1a7a3a; font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; margin-top:10px; }
    .loading { text-align:center; padding:60px; color:#888; font-size:15px; }
  </style>
</head>
<body>
  <nav class="fnav">
    <a href="/"><img src="/logo.png" alt="Logo" style="height:75px; object-fit:contain; display:block; filter:brightness(1.4) contrast(1.2) drop-shadow(0 0 10px rgba(244,69,98,0.7));"></a>
    <div class="fnav-right">
      <span id="greetUser" style="color:white; font-size:13px; font-weight:600;"></span>
      <a href="/" class="back-btn"><i class="fa-solid fa-house"></i> Home</a>
      <button class="btn-logout" id="logoutBtn">Sign Out</button>
    </div>
  </nav>

  <div class="page">
    <h1>My Bookings</h1>
    <p class="subtitle">All your confirmed ticket bookings</p>
    <div id="bookingsList"><div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading your bookings...</div></div>
  </div>

  <script>
    fetch('/api/me')
      .then(r => r.json())
      .then(user => {
        if (!user.loggedIn) {
          window.location.href = '/signin';
          return;
        }
        document.getElementById('greetUser').textContent = `Hi, ${user.name}`;
      });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/');
    });

    fetch('/api/bookings')
      .then(r => {
        if (r.status === 401) { window.location.href = '/signin'; return null; }
        return r.json();
      })
      .then(bookings => {
        if (!bookings) return;
        const container = document.getElementById('bookingsList');

        if (!bookings.length) {
          container.innerHTML = `
            <div class="empty">
              <i class="fa-solid fa-ticket"></i>
              <p>No bookings yet.</p>
              <p style="margin-top:8px"><a href="/">Browse shows and book your first ticket!</a></p>
            </div>`;
          return;
        }

        container.innerHTML = bookings.map(b => {
          const date = new Date(b.bookedAt).toLocaleString('en-IN', {
            day: 'numeric', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
          const imgTag = b.showImage
            ? `<img class="booking-img" src="${b.showImage}" alt="${b.showName}">`
            : `<div class="booking-img-placeholder"><i class="fa-solid fa-film"></i></div>`;
          const seatTags = b.seats.map(s => `<span class="seat-tag">Seat ${s}</span>`).join('');
          return `
            <div class="booking-card">
              ${imgTag}
              <div class="booking-info">
                <div class="booking-title">${b.showName}</div>
                <div class="booking-meta">
                  <span><i class="fa-solid fa-calendar"></i> ${date}</span>
                  <span><i class="fa-solid fa-indian-rupee-sign"></i> ₹${b.fare}</span>
                  <span><i class="fa-solid fa-couch"></i> ${b.seats.length} seat${b.seats.length > 1 ? 's' : ''}</span>
                  ${b.paymentMethod ? `<span><i class="fa-solid fa-credit-card"></i> ${b.paymentMethod.charAt(0).toUpperCase() + b.paymentMethod.slice(1)}</span>` : ''}
                </div>
                <div class="booking-seats" style="margin-top:8px">${seatTags}</div>
                <span class="booking-badge">✓ Confirmed</span>
                ${b.paymentId ? `<span style="font-size:10px; color:#aaa; display:block; margin-top:4px;">Payment ID: ${b.paymentId}</span>` : ''}
              </div>
            </div>`;
        }).join('');
      })
      .catch(() => {
        document.getElementById('bookingsList').innerHTML =
          '<div class="empty"><i class="fa-solid fa-circle-exclamation"></i><p>Failed to load bookings. Please try again.</p></div>';
      });
  </script>
  <script src="js/ads.js"></script>
</body>
</html>
